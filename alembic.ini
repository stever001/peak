# Alembic configuration for Peak's controlled engagement database (MySQL).
# The database URL is NOT stored here — it is read from the PEAK_DATABASE_URL
# environment variable in alembic/env.py (credentials live outside the repo).
# See docs/DATABASE_SCAFFOLD.md.

[alembic]
script_location = alembic
prepend_sys_path = .
# Intentionally left blank: the URL comes from the environment (see alembic/env.py).
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
